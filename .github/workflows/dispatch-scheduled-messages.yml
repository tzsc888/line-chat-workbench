name: Dispatch Scheduled Messages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          BRIDGE_SHARED_SECRET: ${{ secrets.BRIDGE_SHARED_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL is required"
            exit 1
          fi

          if [ -z "$BRIDGE_SHARED_SECRET" ]; then
            echo "BRIDGE_SHARED_SECRET is required"
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            -X POST \
            -H "x-bridge-secret: ${BRIDGE_SHARED_SECRET}" \
            "${APP_BASE_URL%/}/api/bridge/scheduled-messages/dispatch"
