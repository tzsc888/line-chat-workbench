name: Dispatch Automation Jobs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger inbound automation worker endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Fallback executor for queued inbound translation/workflow jobs.
          # Vercel must set ENABLE_LEGACY_CRON_AUTOMATION=true for this endpoint.
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL is required"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is required"
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL%/}/api/cron/automation-jobs"
